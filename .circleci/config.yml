# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/configuration-reference

# For a detailed guide to building and testing with Node, read the docs:
# https://circleci.com/docs/language-javascript/ for more details
version: 2.1

# Orbs are reusable packages of CircleCI configuration that you may share across projects, enabling you to create encapsulated, parameterized commands, jobs, and executors that can be used across multiple projects.
# See: https://circleci.com/docs/orb-intro/
orbs:
  # See the Node orb documentation here: https://circleci.com/developer/orbs/orb/circleci/node
  node: circleci/node@5.2

jobs:
  # Below is the definition of your job to build and test your app, you can rename and customize it as you want.
  build-and-test:
    # Specify the execution environment. You can specify an image from Docker Hub or use one of our convenience images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/executor-intro/ & https://circleci.com/docs/configuration-reference/#executor-job
    docker:
      # Specify the version you desire here
      # See: https://circleci.com/developer/images/image/cimg/node
      - image: cimg/node:22.2

    # Add steps to the job
    # See: https://circleci.com/docs/jobs-steps/#steps-overview & https://circleci.com/docs/configuration-reference/#steps
    steps:
      # Checkout the code as the first step.
      - checkout
      - run: curl -o- -L https://yarnpkg.com/install.sh | bash
      - run: yarn set version berry
      - restore_cache:
          key: yarn-cache-{{ checksum "yarn.lock" }}
      - run: yarn install
      - save_cache:
          key: yarn-cache-{{ checksum "yarn.lock" }}
          paths:
            - ./.yarn/cache
      - run:
          name: Run linter
          command: yarn lint
      - run:
          name: Run tests
          command: yarn test

  build-and-deploy:
    docker:
      - image: cimg/node:22.2
    steps:
      - add_ssh_keys:
          fingerprints:
            - "SHA256:K13r15ubS1ee0uPhmBa67AXCfMvz+s1us8DoK5yj1GA"
      - checkout
      - run: curl -o- -L https://yarnpkg.com/install.sh | bash
      - run: yarn set version berry
      - restore_cache:
          key: yarn-cache-{{ checksum "yarn.lock" }}
      - run: yarn install
      - save_cache:
          key: yarn-cache-{{ checksum "yarn.lock" }}
          paths:
            - ./.yarn/cache
      - run:
          name: Build app
          command: yarn build
      - run:
          name: Deploy to GitHub Pages
          command: |
            cd build
            git init
            git add .
            git config user.email "1903291+hex22a@users.noreply.github.com"
            git config user.name "CircleCI (on behalf of Crash)"
            git commit -m "CircleCI deploy to GitHub Pages"
            git remote add origin https://github.com/hex22a/sssnake.git
            git push -u origin master:gh-pages
# Orchestrate jobs using workflows
# See: https://circleci.com/docs/workflows/ & https://circleci.com/docs/configuration-reference/#workflows
workflows:
  deploy-gh-pages: # This is the name of the workflow, feel free to change it to better match your workflow.
    # Inside the workflow, you define the jobs you want to run.
    jobs:
      - build-and-test
      # For running simple node tests, you could optionally use the node/test job from the orb to replicate and replace the job above in fewer lines.
      # - node/test
      - build-and-deploy:
          requires:
            - build-and-test
